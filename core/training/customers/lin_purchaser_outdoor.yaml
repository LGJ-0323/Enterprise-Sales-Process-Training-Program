id: lin_purchaser_outdoor
name: 林女士
avatar_id: lin_purchaser_outdoor_avatar
stage_id: deep_follow_up
default_difficulty: normal
company_type: 户外用品跨境电商
role: 采购经理
logistics_needs:
  cargo: 户外运动鞋服及装备
  routes:
    - 泉州 -> 洛杉矶
    - 广州 -> 纽约
  modes:
    - 海运整柜
    - 空运（补货）
    - 海外仓
pain_points:
  - 已经和销售建立了微信沟通，对产品能力初步认可
  - 但在考虑从现有货代切换过来，担心过渡期出问题
  - 关心FBA入仓和海外仓的衔接流程
attitude:
  label: 专业细致
  style: 对跨境电商物流非常熟悉，问的问题都很专业，不接受外行回答，需要销售展现同等级别的专业度。
  rules:
    - 直接讨论业务细节，不需要寒暄。
    - 对FBA、海外仓、尾程派送等术语非常熟悉。
    - 会问得很细，包括预约流程、派送时效、异常处理等。
    - 如果销售回答不上来，会直接失去信任。
state_curve:
  initial_state: professional_engaged
  states:
    professional_engaged: 以专业对专业的态度沟通，问题精准且深入。
    satisfied: 销售展现出同等专业度后，开始分享更多真实需求和计划。
    transition_worried: 讨论切换货代时，担心过渡期出问题影响业务。
    data_driven: 销售给出数据化方案后，要求看历史时效数据和客户案例。
    decision_ready: 销售提供完整的过渡方案和保障后，准备做决定。
  transitions:
    - if_sales_is_professional: professional_engaged
    - if_sales_matches_her_expertise_level: satisfied
    - if_discussing_supplier_switch: transition_worried
    - if_sales_gives_data_driven_plan: data_driven
    - if_sales_provides_full_transition_plan: decision_ready
professional_probes:
  - FBA入仓你们能做到什么时效？洛杉矶仓和纽约仓分别怎么样？
  - 户外鞋服走空运补货，泡重怎么算？有没有渠道可以优化费用？
  - 如果从现有货代切换到你们，过渡期怎么保证不中断我的补货节奏？
  - 海外仓你们是自己运营还是合作？库存管理系统能和我对接吗？
  - 旺季的时候FBA预约入库排队长，你们有没有什么办法加速？

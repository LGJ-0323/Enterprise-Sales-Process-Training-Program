<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 实时语音助手</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f7fa;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        button {
            min-width: 96px;
            padding: 12px 24px;
            font-size: 1rem;
            margin: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #startBtn {
            background-color: #007bff;
            color: white;
        }
        #startBtn:hover {
            background-color: #0056b3;
        }
        #stopBtn {
            background-color: #dc3545;
            color: white;
        }
        #stopBtn:hover {
            background-color: #bd2130;
        }
        button:disabled {
            background-color: #cccccc !important;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            color: #666;
            font-size: 0.9rem;
        }
        #debug {
            margin-top: 12px;
            max-width: 460px;
            color: #555;
            font-size: 0.82rem;
            line-height: 1.5;
            text-align: left;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>AI 实时语音助手</h1>
    <button id="startBtn">开始对话</button>
    <button id="stopBtn" disabled>挂断</button>
    <div id="status">状态: 未连接</div>
    <div id="level">麦克风音量: 0</div>
    <div id="debug"></div>
</div>

<script>
    let pc = null;
    let localStream = null;
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusDiv = document.getElementById("status");
    const debugDiv = document.getElementById("debug");
    const levelDiv = document.getElementById("level");
    let audioContext = null;
    let levelTimer = null;

    function setStatus(message) {
        statusDiv.innerText = `状态: ${message}`;
    }

    function clientLog(stage, detail = {}) {
        fetch("/debug/client-log", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ stage, detail, time: new Date().toISOString() }),
        }).catch((error) => {
            console.warn("client log failed", error);
        });
    }

    function cleanup() {
        if (pc) {
            pc.close();
            pc = null;
        }
        if (localStream) {
            localStream.getTracks().forEach((track) => track.stop());
            localStream = null;
        }
        if (levelTimer) {
            clearInterval(levelTimer);
            levelTimer = null;
        }
        if (audioContext) {
            audioContext.close();
            audioContext = null;
        }
        levelDiv.innerText = "麦克风音量: 0";
        startBtn.disabled = false;
        stopBtn.disabled = true;
    }

    function startLevelMeter(stream) {
        audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 1024;
        source.connect(analyser);
        const data = new Uint8Array(analyser.fftSize);
        levelTimer = setInterval(() => {
            analyser.getByteTimeDomainData(data);
            let sum = 0;
            for (const value of data) {
                const normalized = (value - 128) / 128;
                sum += normalized * normalized;
            }
            const rms = Math.sqrt(sum / data.length);
            levelDiv.innerText = `麦克风音量: ${Math.round(rms * 100)}`;
        }, 200);
    }

    function waitForIceGatheringComplete(peerConnection, timeoutMs = 5000) {
        if (peerConnection.iceGatheringState === "complete") {
            return Promise.resolve();
        }
        return new Promise((resolve) => {
            const timeout = setTimeout(() => {
                peerConnection.removeEventListener("icegatheringstatechange", onStateChange);
                resolve();
            }, timeoutMs);
            function onStateChange() {
                clientLog("ice_gathering_state", {
                    state: peerConnection.iceGatheringState,
                });
                if (peerConnection.iceGatheringState === "complete") {
                    clearTimeout(timeout);
                    peerConnection.removeEventListener("icegatheringstatechange", onStateChange);
                    resolve();
                }
            }
            peerConnection.addEventListener("icegatheringstatechange", onStateChange);
        });
    }

    function countCandidates(sdp) {
        return (sdp.match(/^a=candidate:/gm) || []).length;
    }

    function startOutboundStats(peerConnection) {
        setInterval(async () => {
            if (!peerConnection || peerConnection.connectionState === "closed") {
                return;
            }
            const stats = await peerConnection.getStats();
            stats.forEach((report) => {
                if (report.type === "outbound-rtp" && report.kind === "audio") {
                    clientLog("outbound_audio_stats", {
                        packetsSent: report.packetsSent,
                        bytesSent: report.bytesSent,
                    });
                }
            });
        }, 3000);
    }

    async function refreshDebugStatus() {
        try {
            const response = await fetch("/debug/status", { cache: "no-store" });
            const data = await response.json();
            const lines = [
                `后端阶段: ${data.stage || "unknown"}`,
                data.prompt ? `识别: ${data.prompt}` : "",
                data.response_text ? `回复: ${data.response_text}` : "",
                data.audio_bytes ? `语音字节: ${data.audio_bytes}` : "",
                data.error ? `错误: ${data.error}` : "",
            ].filter(Boolean);
            debugDiv.innerText = lines.join("\n");
        } catch (error) {
            debugDiv.innerText = `诊断接口错误: ${error.message}`;
        }
    }

    setInterval(refreshDebugStatus, 1000);
    refreshDebugStatus();

    startBtn.onclick = async () => {
        clientLog("start_clicked");
        cleanup();
        startBtn.disabled = true;

        try {
            setStatus("正在请求麦克风权限...");
            clientLog("before_get_user_media", {
                hasMediaDevices: Boolean(navigator.mediaDevices),
                hasGetUserMedia: Boolean(navigator.mediaDevices?.getUserMedia),
                isSecureContext: window.isSecureContext,
                location: window.location.href,
            });
            localStream = await navigator.mediaDevices.getUserMedia({
                audio: true,
                video: false,
            });
            startLevelMeter(localStream);
            clientLog("got_user_media", {
                tracks: localStream.getTracks().map((track) => ({
                    kind: track.kind,
                    enabled: track.enabled,
                    readyState: track.readyState,
                    label: track.label,
                })),
            });

            pc = new RTCPeerConnection();
            pc.onconnectionstatechange = () => {
                clientLog("connection_state", { state: pc.connectionState });
            };
            pc.oniceconnectionstatechange = () => {
                clientLog("ice_connection_state", { state: pc.iceConnectionState });
            };
            pc.onicegatheringstatechange = () => {
                clientLog("ice_gathering_state", { state: pc.iceGatheringState });
            };
            localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));
            clientLog("peer_connection_created");

            pc.ontrack = (event) => {
                clientLog("remote_track", {
                    streamCount: event.streams.length,
                    trackKind: event.track?.kind,
                });
                let remoteAudio = document.getElementById("remoteAudio");
                if (!remoteAudio) {
                    remoteAudio = document.createElement("audio");
                    remoteAudio.id = "remoteAudio";
                    remoteAudio.autoplay = true;
                    document.body.appendChild(remoteAudio);
                }
                remoteAudio.srcObject = event.streams[0];
                remoteAudio.muted = false;
                remoteAudio.volume = 1;
                remoteAudio.play().catch((error) => {
                    console.error(error);
                    setStatus(`收到音频轨道，但播放失败: ${error.message}`);
                });
                setStatus("已连接，AI 正在聆听/回答...");
            };

            setStatus("正在建立 WebRTC 握手...");
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await waitForIceGatheringComplete(pc);
            clientLog("offer_created", {
                type: pc.localDescription.type,
                sdpLength: pc.localDescription.sdp.length,
                candidateCount: countCandidates(pc.localDescription.sdp),
                iceGatheringState: pc.iceGatheringState,
            });

            const response = await fetch("/webrtc/offer", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    sdp: pc.localDescription.sdp,
                    type: pc.localDescription.type,
                    webrtc_id: crypto.randomUUID(),
                }),
            });
            clientLog("offer_posted", {
                ok: response.ok,
                status: response.status,
            });

            if (!response.ok) {
                const text = await response.text();
                throw new Error(`握手失败: ${response.status} ${text}`);
            }

            const answer = await response.json();
            if (answer.status === "failed") {
                throw new Error(`握手失败: ${answer.meta?.error || "unknown"}`);
            }
            await pc.setRemoteDescription(answer);
            clientLog("remote_description_set");
            startOutboundStats(pc);

            setStatus("已连接，请开始说话");
            stopBtn.disabled = false;
        } catch (error) {
            console.error(error);
            clientLog("start_error", {
                name: error.name,
                message: error.message,
            });
            cleanup();
            setStatus(error.message || "连接失败");
        }
    };

    stopBtn.onclick = () => {
        cleanup();
        setStatus("已挂断");
    };
</script>
</body>
</html>

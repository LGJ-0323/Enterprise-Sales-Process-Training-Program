<!doctype html>
<html lang="zh-CN" class="color-theme-teal">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>实时语音 · 雄达物流客户陪练</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@8.3.1/bundle/css/framework7.bundle.min.css"/>
<style>
  :root {
    --f7-navbar-bg-color: rgba(8, 29, 32, 0.86);
    --f7-navbar-title-text-color: #f6fbfa;
    --f7-navbar-link-color: #d8eeeb;
    --f7-navbar-height: 52px;
    --brand: #0f8f83;
    --brand-deep: #0a6158;
    --brand-soft: #dff5ef;
    --ink: #192330;
    --muted: #66778d;
    --line: rgba(15, 23, 42, 0.08);
    --panel: rgba(255, 255, 255, 0.9);
    --panel-strong: rgba(255, 255, 255, 0.96);
    --page-a: #f4f8f4;
    --page-b: #ecf3f0;
    --shadow-lg: 0 18px 42px rgba(15, 23, 42, 0.08);
    --shadow-sm: 0 8px 20px rgba(15, 23, 42, 0.05);
  }
  html, body, .page, .page-content {
    background:
      radial-gradient(circle at top left, rgba(15, 143, 131, 0.15), transparent 30%),
      radial-gradient(circle at top right, rgba(14, 165, 233, 0.12), transparent 26%),
      linear-gradient(180deg, var(--page-a), var(--page-b));
    color: var(--ink);
    overflow-x: hidden;
  }
  body {
    font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
    letter-spacing: 0;
  }
  .navbar {
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  .page-navbar {
    display: none;
  }
  .navbar .title { font-weight: 800 !important; }
  .page-content {
    padding: 10px 0 calc(124px + env(safe-area-inset-bottom));
    display: flex;
    justify-content: center;
  }
  .page-shell {
    width: min(calc(100vw - 28px), 760px);
    margin: 0 auto;
    padding: 0;
    overflow-x: clip;
    box-sizing: border-box;
  }
  .module-stack {
    display: grid;
    gap: 14px;
  }
  .hero-band {
    position: relative;
    overflow: hidden;
    margin: 6px 2px 14px;
    padding: 18px 18px 16px;
    border: 1px solid rgba(255,255,255,0.32);
    border-radius: 22px;
    background:
      linear-gradient(145deg, rgba(8, 29, 32, 0.92), rgba(12, 76, 70, 0.9)),
      linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
    box-shadow: 0 22px 44px rgba(8, 29, 32, 0.2);
    color: #f8fffd;
  }
  .hero-band::after {
    content: "";
    position: absolute;
    inset: auto -10% -45% 48%;
    height: 220px;
    background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 58%);
    pointer-events: none;
  }
  .hero-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 900;
    text-transform: uppercase;
    color: rgba(232, 246, 243, 0.9);
    letter-spacing: 0.04em;
  }
  .hero-kicker::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #3dd3bf;
    box-shadow: 0 0 0 6px rgba(61, 211, 191, 0.14);
  }
  .hero-title {
    margin-top: 12px;
    font-size: clamp(26px, 5vw, 34px);
    line-height: 1.08;
    font-weight: 900;
  }
  .hero-sub {
    margin-top: 8px;
    max-width: 32ch;
    font-size: 13px;
    line-height: 1.55;
    color: rgba(235, 247, 244, 0.78);
  }
  .hero-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .hero-chip {
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.08);
    font-size: 12px;
    font-weight: 650;
    color: rgba(247, 254, 252, 0.88);
  }
  .hero-link {
    text-decoration: none;
  }
  .surface-card {
    margin: 0 2px 14px;
    padding: 16px 16px 15px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--panel);
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  .surface-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 12px;
  }
  .surface-title h2,
  .surface-title span {
    margin: 0;
    font-size: 14px;
    font-weight: 800;
    color: var(--ink);
  }
  .surface-note {
    font-size: 12px;
    color: var(--muted);
  }
  .module-bubble {
    position: relative;
    overflow: hidden;
    margin: 0 2px;
    padding: 18px 16px 16px;
    border: 1px solid rgba(15, 23, 42, 0.06);
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(247,250,249,0.88));
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  .module-bubble::after {
    content: "";
    position: absolute;
    inset: auto -18px -38px auto;
    width: 132px;
    height: 132px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(15, 143, 131, 0.12), transparent 62%);
    pointer-events: none;
  }
  .module-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  .module-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(15, 143, 131, 0.08);
    border: 1px solid rgba(15, 143, 131, 0.12);
    font-size: 12px;
    font-weight: 800;
    color: var(--brand-deep);
  }
  .module-pill::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--brand);
    box-shadow: 0 0 0 5px rgba(15, 143, 131, 0.14);
  }
  .module-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    text-decoration: none;
    color: var(--ink);
    position: relative;
    z-index: 1;
  }
  .module-link::after {
    content: "›";
    font-size: 22px;
    color: #9aa7b8;
    line-height: 1;
  }
  .config-link,
  .history-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    text-decoration: none;
    color: var(--ink);
  }
  .config-copy,
  .history-copy {
    min-width: 0;
  }
  .config-label,
  .history-label {
    font-size: 13px;
    font-weight: 750;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .config-value,
  .history-value {
    margin-top: 6px;
    font-size: 15px;
    font-weight: 800;
    color: var(--ink);
  }
  .config-grid {
    display: grid;
    gap: 12px;
    position: relative;
    z-index: 1;
  }
  .config-field {
    display: grid;
    gap: 7px;
  }
  .config-field-label {
    font-size: 12px;
    font-weight: 750;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .config-select {
    width: 100%;
    min-height: 48px;
    padding: 0 14px;
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 16px;
    background: rgba(255,255,255,0.88);
    color: var(--ink);
    font-size: 15px;
    font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
    appearance: none;
    -webkit-appearance: none;
    background-image:
      linear-gradient(45deg, transparent 50%, #6b7a8d 50%),
      linear-gradient(135deg, #6b7a8d 50%, transparent 50%),
      linear-gradient(180deg, rgba(255,255,255,0.95), rgba(247,250,249,0.92));
    background-position:
      calc(100% - 22px) calc(50% - 1px),
      calc(100% - 16px) calc(50% - 1px),
      0 0;
    background-size: 6px 6px, 6px 6px, 100% 100%;
    background-repeat: no-repeat;
  }
  .config-select:focus {
    outline: none;
    border-color: rgba(15,143,131,0.45);
    box-shadow: 0 0 0 4px rgba(15,143,131,0.12);
  }
  .config-select:disabled {
    opacity: 0.65;
  }
  .status-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    width: calc(100% - 4px);
    margin: 0 2px 14px;
    padding: 14px 16px;
    border-radius: 20px;
    border: 1px solid transparent;
    box-shadow: var(--shadow-sm);
    font-size: 14px;
    font-weight: 750;
  }
  .status-badge.listening { background: #edf9f2; color: #18784a; border-color: rgba(34,197,94,0.18); }
  .status-badge.processing { background: #fff8eb; color: #b45309; border-color: rgba(245,158,11,0.2); }
  .status-badge.speaking { background: #eef6ff; color: #1d4ed8; border-color: rgba(59,130,246,0.18); }
  .status-badge.idle { background: rgba(255,255,255,0.68); color: #64748b; border-color: rgba(148,163,184,0.15); }
  .status-badge.error { background: #fff1f2; color: #b91c1c; border-color: rgba(239,68,68,0.18); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.listening { background: #22c55e; animation: pulse-dot 1.5s infinite; }
  .status-dot.processing { background: #f59e0b; animation: pulse-dot .75s infinite; }
  .status-dot.speaking { background: #3b82f6; }
  .status-dot.idle { background: #94a3b8; }
  @keyframes pulse-dot { 0%,100% { opacity:1 } 50% { opacity:.25 } }
  .persona-card,
  .scoring-block {
    display: none;
  }
  .persona-card.show,
  .scoring-block.show {
    display: block;
  }
  .persona-row {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .persona-avatar {
    width: 72px;
    height: 72px;
    border-radius: 22px;
    background:
      radial-gradient(circle at 30% 30%, rgba(255,255,255,0.82), transparent 35%),
      linear-gradient(160deg, #e8faf6, #d7f1eb);
    display: grid;
    place-items: center;
    font-size: 32px;
    color: var(--brand-deep);
    box-shadow:
      inset 0 0 0 1px rgba(15, 143, 131, 0.08),
      0 12px 24px rgba(15, 143, 131, 0.1);
  }
  .persona-copy {
    flex: 1;
    min-width: 0;
  }
  .persona-name {
    font-size: 20px;
    font-weight: 850;
    color: var(--brand-deep);
  }
  .persona-meta {
    margin-top: 4px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--muted);
  }
  .persona-roleline {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(15, 143, 131, 0.06);
    border: 1px solid rgba(15, 143, 131, 0.08);
    font-size: 13px;
    line-height: 1.55;
    color: #335164;
  }
  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 12px 0 0;
  }
  .tag-chip {
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid rgba(15, 143, 131, 0.12);
    background: #eef9f5;
    font-size: 11px;
    font-weight: 700;
    color: var(--brand-deep);
  }
  .goal-copy {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(15, 23, 42, 0.06);
    font-size: 13px;
    line-height: 1.65;
    color: #425166;
  }
  .persona-desc {
    margin-top: 12px;
    font-size: 13px;
    line-height: 1.6;
    color: #425166;
  }
  .interim-text {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    padding: 0 6px 8px;
    min-height: 20px;
  }
  .messages {
    position: relative;
    min-height: 300px;
    margin: 0 2px 14px !important;
    padding: 8px 0 18px;
    border: 1px solid rgba(15, 23, 42, 0.06);
    border-radius: 24px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.72), rgba(248,252,250,0.92)) !important;
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  .messages::before {
    content: "对话记录";
    position: absolute;
    top: 14px;
    left: 18px;
    z-index: 2;
    font-size: 12px;
    font-weight: 750;
    letter-spacing: 0.04em;
    color: var(--muted);
  }
  .messages .messages-content {
    padding-top: 28px;
    padding-bottom: 18px;
  }
  .chat-shell {
    padding: 0;
    background: transparent;
    border: none;
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }
  .chat-shell::after {
    display: none;
  }
  .messages .message {
    margin: 12px 14px;
  }
  .messages .message-name {
    margin-bottom: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
  }
  .messages .bubble {
    padding: 13px 15px;
    border-radius: 18px;
    border: 1px solid rgba(15, 23, 42, 0.06);
    background: var(--panel-strong);
    color: var(--ink);
    box-shadow: 0 10px 18px rgba(15, 23, 42, 0.05);
    font-size: 14px;
    line-height: 1.65;
  }
  .messages .message-avatar {
    width: 30px;
    height: 30px;
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: #ecf7f3;
    box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.04);
  }
  .message-sent .bubble {
    background: linear-gradient(145deg, var(--brand), var(--brand-deep)) !important;
    color: #fff !important;
    border-color: transparent;
  }
  .message-sent .message-avatar {
    background: linear-gradient(145deg, #113b44, #0b5f69);
    color: #e8fbf8;
  }
  .message-received .message-avatar {
    color: var(--brand-deep);
  }
  .scoring-block {
    margin: 0 2px 14px;
    padding: 18px 16px 16px;
    border: 1px solid rgba(15, 23, 42, 0.06);
    border-radius: 22px;
    background: var(--panel);
    box-shadow: var(--shadow-lg);
  }
  .score-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .score-big {
    font-size: 48px;
    font-weight: 950;
    line-height: 0.95;
    color: var(--brand);
  }
  .score-label {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    max-width: 120px;
  }
  .dim-row {
    display: grid;
    grid-template-columns: 62px 1fr 38px;
    align-items: center;
    gap: 10px;
    margin: 8px 0;
    font-size: 12px;
  }
  .dim-name {
    text-align: right;
    color: #425166;
    font-weight: 700;
  }
  .dim-bar-wrap {
    height: 7px;
    border-radius: 999px;
    background: #e3ebf1;
    overflow: hidden;
  }
  .dim-bar-fill {
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--brand), #2f80ed);
    transition: width .4s;
  }
  .dim-pct {
    text-align: right;
    color: var(--muted);
    font-weight: 700;
  }
  .fb-line {
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.55;
    margin: 6px 0 0;
  }
  .fb-line.good { background: #f0fdf4; color: #15803d; border-left: 3px solid #22c55e; }
  .fb-line.warn { background: #fffbeb; color: #b45309; border-left: 3px solid #f59e0b; }
  .fab-btn {
    position: fixed;
    bottom: max(24px, calc(env(safe-area-inset-bottom) + 12px));
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    width: min(calc(100% - 28px), 360px);
    height: 58px;
    border-radius: 18px;
    border: none;
    font-size: 17px;
    font-weight: 800;
    color: #fff;
    box-shadow: 0 18px 32px rgba(15, 143, 131, 0.32);
    cursor: pointer;
    transition: transform .22s ease, box-shadow .22s ease, opacity .22s ease;
  }
  .fab-btn.start { background: linear-gradient(135deg, #12a392, var(--brand-deep)); }
  .fab-btn.stop { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 18px 32px rgba(239,68,68,0.28); }
  .fab-btn:active { transform: translateX(-50%) scale(0.99); }
  .fab-btn:disabled { opacity: .55; cursor: default; box-shadow: none; }
  .sheet-modal,
  .popup {
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .sheet-modal .toolbar,
  .popup .navbar {
    background: rgba(255,255,255,0.92);
  }
  .sheet-modal-inner,
  .popup .page-content {
    background: linear-gradient(180deg, #f8fbfa, #eef4f2);
  }
  .sheet-config .item-content,
  .history-item {
    font-size: 15px;
  }
  .history-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 10px;
    padding: 14px;
    border: 1px solid rgba(15, 23, 42, 0.06);
    border-radius: 16px;
    background: rgba(255,255,255,0.86);
    box-shadow: var(--shadow-sm);
  }
  .history-item:last-child {
    margin-bottom: 0;
  }
  .history-list {
    display: grid;
    gap: 10px;
    position: relative;
    z-index: 1;
  }
  .history-empty {
    padding: 18px 14px;
    border-radius: 16px;
    background: rgba(255,255,255,0.72);
    border: 1px dashed rgba(15, 23, 42, 0.08);
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .detail-row {
    padding: 12px 0;
    border-bottom: 1px solid rgba(15, 23, 42, 0.06);
    font-size: 14px;
    line-height: 1.6;
  }
  @media (min-width: 768px) {
    .page-content {
      padding-top: 20px;
    }
    .hero-band {
      padding: 22px 24px 20px;
    }
  }
</style>
</head>
<body>
<div id="app">
  <!-- F7 Views -->
  <div class="view view-main">
    <div class="page">
      <!-- Navbar -->
      <div class="navbar page-navbar">
        <div class="navbar-bg"></div>
        <div class="navbar-inner sliding">
          <div class="left"><a href="/mobile/upload" class="link" id="altModeLink" style="color:#fff">上传版</a></div>
          <div class="title">雄达物流客户陪练</div>
          <div class="right"><span class="badge color-green" id="modeBadge" style="font-size:12px">实时</span></div>
        </div>
      </div>

      <div class="page-content">
        <div class="page-shell">
          <section class="hero-band">
            <div class="hero-kicker">雄达物流</div>
            <div class="hero-title">客户陪练</div>
            <div class="hero-meta">
              <span class="hero-chip" id="modeChip">实时模式</span>
              <span class="hero-chip">美国线训练</span>
              <a class="hero-chip hero-link" href="/mobile/compat">兼容检测</a>
              <a class="hero-chip hero-link" href="/realtime">经典实时</a>
            </div>
          </section>

          <div class="module-stack">
            <section class="module-bubble">
              <div class="module-head">
                <span class="module-pill">训练配置</span>
                <span class="surface-note">随时切换阶段、难度和音色</span>
              </div>
              <div class="config-grid">
                <div class="config-field">
                  <label class="config-field-label" for="stageSelect">阶段</label>
                  <select class="config-select" id="stageSelect"></select>
                </div>
                <div class="config-field">
                  <label class="config-field-label" for="difficultySelect">难度</label>
                  <select class="config-select" id="difficultySelect"></select>
                </div>
                <div class="config-field">
                  <label class="config-field-label" for="voiceSelect">音色</label>
                  <select class="config-select" id="voiceSelect"></select>
                </div>
              </div>
            </section>

            <div class="status-badge idle" id="statusBadge">
              <span class="status-dot idle" id="statusDot"></span>
              <span id="statusText">准备就绪，点击按钮开始</span>
            </div>

            <section class="module-bubble persona-card" id="personaCard">
              <div class="module-head">
                <span class="module-pill">客户画像</span>
                <span class="surface-note">根据阶段和难度实时预览</span>
              </div>
              <div class="persona-row">
                <div class="persona-avatar" id="personaAvatar">🧑</div>
                <div class="persona-copy">
                  <div class="persona-name" id="personaName">--</div>
                  <div class="persona-meta" id="personaMeta"></div>
                  <div class="persona-roleline" id="personaRoleline"></div>
                </div>
              </div>
              <div class="persona-desc" id="personaDesc"></div>
              <div class="tag-row" id="personaTags"></div>
              <div class="goal-copy" id="goalText"></div>
            </section>

            <section class="module-bubble chat-shell">
              <div class="interim-text" id="interimText"></div>
              <div class="messages" id="chatMessages">
                <div class="messages-content"></div>
              </div>
            </section>

            <section class="module-bubble scoring-block" id="scoringBlock">
              <div class="module-head">
                <span class="module-pill">实时评分</span>
                <span class="surface-note">按轮次查看训练反馈</span>
              </div>
              <div class="score-head">
                <div class="score-big" id="scoreBig">--</div>
                <div class="score-label" id="scoreLabel">等待训练</div>
              </div>
              <div id="dimBars" style="margin-top:10px"></div>
              <div id="feedbackArea"></div>
            </section>

            <section class="module-bubble">
              <div class="module-head">
                <span class="module-pill">训练记录</span>
                <span class="surface-note">最近完成的会话</span>
              </div>
              <div class="history-list" id="historyList"></div>
            </section>
          </div>
        </div>
      </div>

      <!-- 浮动按钮 -->
      <button class="fab-btn start" id="actionBtn" onclick="toggleSession()">开始对话</button>
    </div>
  </div>

</div>

<script type="importmap">
{
  "imports": {
    "framework7": "https://cdn.jsdelivr.net/npm/framework7@8.3.1/+esm",
    "framework7/bundle": "https://cdn.jsdelivr.net/npm/framework7@8.3.1/bundle/+esm"
  }
}
</script>
<script type="module">
import Framework7 from 'framework7/bundle';
import { Dom7 } from 'framework7/bundle';

const app = new Framework7({
  el: '#app',
  name: '雄达物流客户陪练',
  theme: 'md',
  darkMode: false,
});

const $$ = Dom7;
const isMobileOmni = location.pathname === '/mobile' || location.pathname.startsWith('/mobile/');
const wsPath = isMobileOmni ? '/ws/mobile-omni' : '/ws/voice';
const sessionPrefix = isMobileOmni ? 'omni' : 'ws';

// ── DOM refs ──
const $statusBadge = $$('#statusBadge');
const $statusDot = $$('#statusDot');
const $statusText = $$('#statusText');
const $interimText = $$('#interimText');
const $actionBtn = $$('#actionBtn');
const $stageSelect = $$('#stageSelect');
const $difficultySelect = $$('#difficultySelect');
const $voiceSelect = $$('#voiceSelect');
const $personaRoleline = $$('#personaRoleline');
const $modeBadge = $$('#modeBadge');
const $modeChip = $$('#modeChip');
const $altModeLink = $$('#altModeLink');

if (isMobileOmni) {
  $modeBadge.text('Omni');
  $modeChip.text('Omni 实时');
  $altModeLink.attr('href', '/mobile/upload').text('上传版');
} else {
  $modeBadge.text('经典实时');
  $modeChip.text('ASR + LLM + TTS');
  $altModeLink.attr('href', '/mobile').text('Omni版');
}

// ── Messages ──
const messages = app.messages.create({
  el: '#chatMessages',
  typing: false,
});

// ── State ──
const state = {
  stage: '', difficulty: '', voice: '',
  stages: [], difficulties: [], voices: [],
  active: false, currentStage: 'idle',
  sessionId: '', wsState: 'idle',
  history: [],
};

function setStatus(stage, text) {
  state.currentStage = stage;
  const cls = ['listening','processing','speaking','idle','error'].includes(stage) ? stage : 'idle';
  $statusBadge.removeClass('listening processing speaking idle error').addClass(cls);
  $statusDot.removeClass('listening processing speaking idle').addClass(cls);
  $statusText.text(text);
  $interimText.text(stage === 'listening' ? '正在听你说话...' : '');
}

function setConfigDisabled(disabled) {
  $stageSelect.prop('disabled', disabled);
  $difficultySelect.prop('disabled', disabled);
  $voiceSelect.prop('disabled', disabled);
}

function fillSelect($el, items, value) {
  const html = items.map(item => '<option value="' + item.value + '">' + item.label + '</option>').join('');
  $el.html(html);
  if (value) $el.val(value);
}

let personaPreviewToken = 0;
async function loadPersonaPreview() {
  if (!state.stage || !state.difficulty) return;
  const token = ++personaPreviewToken;
  try {
    const url = '/api/persona?stage_id=' + encodeURIComponent(state.stage) +
      '&difficulty_id=' + encodeURIComponent(state.difficulty) +
      '&voice_id=' + encodeURIComponent(state.voice || '');
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok || token !== personaPreviewToken) return;
    $$('#personaName').text(data.name || '客户');
    $$('#personaMeta').text([data.role, data.style].filter(Boolean).join(' · '));
    $personaRoleline.text([data.stage, data.difficulty, data.voice_label].filter(Boolean).join(' · '));
    $$('#personaDesc').text(data.desc || '');
    $$('#personaTags').html((data.traits || []).slice(0, 6).map(c => '<span class="tag-chip">' + c + '</span>').join(''));
    $$('#goalText').text(data.goal || '');
    $$('#personaCard').addClass('show');
  } catch (e) {}
}

function resetPanels() {
  $$('#personaCard').removeClass('show');
  $$('#personaName').text('--');
  $$('#personaMeta').text('');
  $personaRoleline.text('');
  $$('#personaDesc').text('');
  $$('#personaTags').html('');
  $$('#goalText').text('');
  $$('#scoringBlock').removeClass('show');
  $$('#scoreBig').text('--');
  $$('#scoreLabel').text('等待训练');
  $$('#dimBars').html('');
  $$('#feedbackArea').html('');
  messages.clear();
}

// ═══════ Audio / WebSocket (unchanged logic) ═══════
const REQUESTED_SR = 16000; const CHUNK_MS = 100;
const IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
const IS_WECOM = /wxwork/i.test(navigator.userAgent);
const SCRIPT_BUF = IS_IOS ? 1024 : 2048;
const WS_HWM = IS_IOS ? 262144 : 131072;
const TTS_SR = 24000; const TTS_LEAD = IS_IOS ? 0.06 : 0.03;
const RMS_GATE = IS_IOS ? 0.0045 : 0.0025;
const SPEECH_GATE = IS_IOS ? 0.009 : 0.0045;
const SILENCE_MS = IS_IOS ? 760 : 550;
const SHORT_UTTERANCE_MS = IS_IOS ? 1800 : 1200;
const SHORT_SILENCE_MS = IS_IOS ? 980 : 700;
const MIN_SPEECH_MS = IS_IOS ? 520 : 320;
const FLUSH_CONFIRM_MS = IS_IOS ? 140 : 80;
const FLUSH_COOLDOWN_MS = IS_IOS ? 900 : 650;

let ws = null; let audioCtx = null; let stream = null;
let scriptProcessor = null; let silentGain = null;
let wsReconnectCount = 0; const WS_MAX = 5;
let clientSpeechActive = false; let clientFlushSent = false;
let clientSpeechAt = 0; let clientLastVoiceAt = 0; let clientFlushReadyAt = 0; let clientLastFlushAt = 0; let lastLevelAt = 0;
let omniTurnDetection = isMobileOmni ? 'server_vad' : 'manual';

function resetClientSpeech() { clientSpeechActive = false; clientFlushSent = false; clientSpeechAt = 0; clientLastVoiceAt = 0; clientFlushReadyAt = 0; }
function usesOmniServerVad() { return isMobileOmni && omniTurnDetection !== 'manual'; }

const playQueue = []; let playing = false; let nextTtsAt = 0;
const activeSources = new Set(); let ttsOpen = false; let ttsDone = false; let ttsGain = null;

function ensureTtsGain() { if (!audioCtx) return false; if (!ttsGain) { ttsGain = audioCtx.createGain(); ttsGain.gain.value = 0.9; ttsGain.connect(audioCtx.destination); } return true; }

function enqueueAudio(buf) { playQueue.push(buf); drainQueue(); }

function drainQueue() {
  if (!audioCtx || !ensureTtsGain() || playQueue.length === 0) {
    if (activeSources.size === 0) { playing = false; if (ttsDone) { ttsOpen = false; ttsDone = false; if (state.active) setStatus('listening'); } }
    return;
  }
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  const now = audioCtx.currentTime;
  if (!nextTtsAt || nextTtsAt < now + TTS_LEAD) nextTtsAt = now + TTS_LEAD;
  playing = true;
  while (playQueue.length > 0) {
    const buf = playQueue.shift();
    const f32 = new Float32Array(buf.length);
    for (let i = 0; i < buf.length; i++) f32[i] = buf[i] / 32768;
    const ab = audioCtx.createBuffer(1, f32.length, TTS_SR); ab.getChannelData(0).set(f32);
    const src = audioCtx.createBufferSource(); src.buffer = ab; src.connect(ttsGain);
    const sched = nextTtsAt; nextTtsAt = sched + ab.duration;
    activeSources.add(src);
    src.onended = () => { activeSources.delete(src); if (activeSources.size === 0 && playQueue.length === 0) { playing = false; if (ttsDone) { ttsOpen = false; ttsDone = false; if (state.active) setStatus('listening'); } } };
    src.start(sched);
  }
}

function beginTtsStream() { resetTts(true); ttsOpen = true; ttsDone = false; }
function finishTtsStream() { ttsDone = true; drainQueue(); if (!playing && playQueue.length === 0 && activeSources.size === 0) { ttsOpen = false; if (state.active) setStatus('listening'); } }

function resetTts(hard) {
  if (hard) { activeSources.forEach(s => { try { s.onended = null; s.stop(0); } catch(e){} }); activeSources.clear(); }
  playQueue.length = 0; playing = false; nextTtsAt = 0; ttsOpen = false; ttsDone = false;
}

async function unlockAudio() {
  if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; audioCtx = new AC({ latencyHint: 'interactive' }); }
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  const b = audioCtx.createBuffer(1, 1, 22050); const s = audioCtx.createBufferSource(); s.buffer = b; s.connect(audioCtx.destination); s.start(0);
}

async function startMic() {
  if (silentGain) { silentGain.disconnect(); silentGain = null; }
  stream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: REQUESTED_SR, channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
  if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; audioCtx = new AC({ latencyHint: 'interactive', sampleRate: REQUESTED_SR }); }
  const source = audioCtx.createMediaStreamSource(stream);
  scriptProcessor = audioCtx.createScriptProcessor(SCRIPT_BUF, 1, 1);
  scriptProcessor.onaudioprocess = (e) => {
    if (!state.active || !ws || ws.readyState !== WebSocket.OPEN) return;
    const input = e.inputBuffer.getChannelData(0);
    let sq = 0; for (let i = 0; i < input.length; i++) sq += input[i] * input[i];
    const rms = Math.sqrt(sq / input.length); const now = Date.now();
    if (rms >= RMS_GATE) {
      if (!clientSpeechActive) { clientSpeechActive = true; clientFlushSent = false; clientSpeechAt = now; }
      clientFlushReadyAt = 0;
      if (rms >= SPEECH_GATE) clientLastVoiceAt = now;
    } else if (!usesOmniServerVad() && clientSpeechActive && !clientFlushSent && now - clientLastVoiceAt >= SILENCE_MS && now - clientSpeechAt >= MIN_SPEECH_MS) {
      const utteranceAge = now - clientSpeechAt;
      const requiredSilence = utteranceAge < SHORT_UTTERANCE_MS ? SHORT_SILENCE_MS : SILENCE_MS;
      if (now - clientLastVoiceAt < requiredSilence) return;
      if (now - clientLastFlushAt < FLUSH_COOLDOWN_MS) return;
      if (!clientFlushReadyAt) {
        clientFlushReadyAt = now;
      } else if (now - clientFlushReadyAt >= FLUSH_CONFIRM_MS) {
        clientFlushSent = true;
        clientFlushReadyAt = 0;
        clientLastFlushAt = now;
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'control', action: 'flush' }));
      }
    }
    if (rms < RMS_GATE && !(usesOmniServerVad() && clientSpeechActive)) return;
    const int16 = new Int16Array(input.length);
    for (let i = 0; i < input.length; i++) int16[i] = Math.max(-32768, Math.min(32767, input[i] * 32768 * 0.85));
    if (now - lastLevelAt > 250) { $interimText.text('音量 ' + '▮'.repeat(Math.min(10, Math.round(rms * 180))) + '▯'.repeat(Math.max(0, 10 - Math.round(rms * 180)))); lastLevelAt = now; }
    if (ws.bufferedAmount < WS_HWM) ws.send(int16.buffer);
  };
  source.connect(scriptProcessor);
  silentGain = audioCtx.createGain(); silentGain.gain.value = 0;
  scriptProcessor.connect(silentGain); silentGain.connect(audioCtx.destination);
}

function stopMic() {
  resetClientSpeech();
  if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
  if (silentGain) { silentGain.disconnect(); silentGain = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + wsPath);
  ws.binaryType = 'arraybuffer'; state.wsState = 'connecting';
  ws.onopen = () => { wsReconnectCount = 0; state.wsState = 'connected'; resetClientSpeech();
    ws.send(JSON.stringify({ type: 'control', action: 'start', session_id: state.sessionId, config: { stage_id: state.stage, difficulty_id: state.difficulty, voice_id: state.voice, sample_rate: audioCtx ? audioCtx.sampleRate : REQUESTED_SR } }));
  };
  ws.onmessage = (event) => {
    if (event.data instanceof ArrayBuffer) { enqueueAudio(new Int16Array(event.data)); return; }
    try { handleMsg(JSON.parse(event.data)); } catch(e) {}
  };
  ws.onclose = () => { wsReconnectCount++; state.wsState = 'idle';
    if (state.active && wsReconnectCount <= WS_MAX) { setStatus('idle', '重连中...'); setTimeout(() => { if (state.active) connectWS(); }, Math.min(2000 * wsReconnectCount, 10000)); }
    else if (state.active) { setStatus('error', '连接失败'); state.wsState = 'error'; } };
  ws.onerror = () => { state.wsState = 'error'; setStatus('error', 'WebSocket 错误'); };
}

function handleMsg(msg) {
  switch (msg.type) {
    case 'status': resetClientSpeech(); if (msg.stage === 'speaking') beginTtsStream(); setStatus(msg.stage, msg.detail); break;
    case 'persona':
      $$('#personaName').text(msg.name || '客户');
      $$('#personaMeta').text([msg.role, msg.location, msg.style].filter(Boolean).join(' · '));
      $personaRoleline.text([msg.stage_label, msg.difficulty_label].filter(Boolean).join(' · '));
      $$('#personaDesc').text(msg.scene || '');
      $$('#personaTags').html((msg.concerns || []).map(c => '<span class="tag-chip">' + c + '</span>').join(''));
      $$('#personaCard').addClass('show');
      break;
    case 'goal':
      $$('#goalText').text(msg.goal || '');
      if (msg.opening && messages.messages.length === 0) messages.addMessage({ text: msg.opening, type: 'received', name: '客户', avatar: '🧑' });
      break;
    case 'asr_partial':
      $interimText.text('正在识别：' + (msg.text || ''));
      break;
    case 'asr_final': resetClientSpeech(); $interimText.text(''); messages.addMessage({ text: msg.text, type: 'sent', name: '我', avatar: '💼' }); break;
    case 'response_text': messages.addMessage({ text: msg.text, type: 'received', name: msg.guardrail ? '客户 (已纠偏)' : '客户', avatar: '🧑' }); break;
    case 'tts_done': finishTtsStream(); break;
    case 'evaluation':
      $$('#scoreBig').text(msg.score != null ? msg.score : '--');
      $$('#scoreLabel').text(msg.terminal ? (msg.is_success ? '会话成功' : '会话结束') : '本轮得分');
      $$('#dimBars').html((msg.dimensions || []).map(d => {
        const pct = d.max ? Math.round(d.score * 100 / d.max) : d.score;
        return '<div class="dim-row"><span class="dim-name">' + d.name + '</span><div class="dim-bar-wrap"><div class="dim-bar-fill" style="width:' + pct + '%"></div></div><span class="dim-pct">' + pct + '%</span></div>';
      }).join(''));
      if (msg.score_notes) $$('#feedbackArea').html(Object.entries(msg.score_notes).filter(([,v])=>v).map(([k,v])=>'<div class="fb-line warn">'+k+': '+v+'</div>').join(''));
      $$('#scoringBlock').addClass('show');
      break;
    case 'final_evaluation': handleMsg(msg); $$('#scoreLabel').text(msg.source === 'llm' ? 'AI 复盘得分' : '综合评分');
      if (msg.strengths) $$('#feedbackArea').append('<div class="fb-line good">' + msg.strengths[0] + '</div>'); break;
    case 'state_change': app.toast.show({ text: '客户状态: ' + (msg.from||'?') + ' → ' + (msg.to||'?'), position: 'top', closeTimeout: 2500 }); break;
    case 'session_info': break;
    case 'session_end': setStatus('idle', '会话结束，共' + (msg.turn_count||0) + '轮'); state.active = false; stopMic(); setConfigDisabled(false); $actionBtn.removeClass('stop').addClass('start').text('开始对话'); loadHistory(); break;
    case 'ready':
      if (msg.turn_detection) omniTurnDetection = msg.turn_detection;
      break;
    case 'error': setStatus('error', msg.message); break;
  }
}

async function toggleSession() {
  if (state.active) {
    state.active = false;
    if (ws) ws.send(JSON.stringify({ type: 'control', action: 'end' }));
    stopMic(); resetTts(true); setStatus('idle', '已停止');
    setConfigDisabled(false);
    $actionBtn.removeClass('stop').addClass('start').text('开始对话');
  } else {
    try {
      await unlockAudio(); await startMic();
      resetPanels();
      state.sessionId = sessionPrefix + '-' + Date.now() + '-' + Math.random().toString(16).slice(2);
      connectWS(); state.active = true; setStatus('listening');
      setConfigDisabled(true);
      $actionBtn.removeClass('start').addClass('stop').text('结束对话');
    } catch(e) { setStatus('error', e.message || '启动失败'); setConfigDisabled(false); state.active = false; }
  }
}

// ── Config ──
async function loadConfig() {
  try { const r = await fetch('/api/training/config'); const d = await r.json();
    state.stages = d.stages; state.difficulties = d.difficulties; state.voices = d.voices;
    if (d.defaults) { state.stage = d.defaults.stage_id || ''; state.difficulty = d.defaults.difficulty_id || ''; state.voice = d.defaults.voice_id || ''; }
    fillSelect($stageSelect, state.stages, state.stage);
    fillSelect($difficultySelect, state.difficulties, state.difficulty);
    fillSelect($voiceSelect, state.voices, state.voice);
    loadPersonaPreview();
  } catch(e) {}
}

$stageSelect.on('change', function() { state.stage = $$(this).val(); loadPersonaPreview(); });
$difficultySelect.on('change', function() { state.difficulty = $$(this).val(); loadPersonaPreview(); });
$voiceSelect.on('change', function() { state.voice = $$(this).val(); loadPersonaPreview(); });

// ── History ──
async function loadHistory() {
  try { const r = await fetch('/api/training/history?limit=10'); state.history = await r.json(); } catch(e) { state.history = []; }
  const html = state.history.length === 0 ? '<div class="history-empty">暂无训练记录</div>'
    : state.history.map(s => {
      const sc = s.score != null ? s.score : '?';
      const cls = sc >= 80 ? 'green' : sc >= 60 ? 'orange' : 'red';
      return '<div class="history-item">' +
        '<span class="badge color-'+cls+'" style="font-size:16px;min-width:36px;text-align:center">'+sc+'</span>' +
        '<div style="flex:1"><div style="font-weight:700">'+ (s.stage||'训练') + ' · ' + (s.difficulty||'') + '</div><div style="font-size:11px;color:#94a3b8">'+ (s.completed_at||'').slice(0,10) + ' · ' + (s.turn_count||0) + '轮</div></div>' +
      '</div>';
    }).join('');
  $$('#historyList').html(html);
}

// ── Init ──
loadConfig(); loadHistory();
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { setStatus('error', '浏览器不支持麦克风'); }

// Expose toggleSession globally
window.toggleSession = toggleSession;
</script>
</body>

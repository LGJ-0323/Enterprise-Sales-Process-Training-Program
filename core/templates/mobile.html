<!doctype html>
<html lang="zh-CN" class="color-theme-teal">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>雄达物流客户陪练</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7@8.3.1/bundle/css/framework7.bundle.min.css"/>
<style>
  :root {
    --f7-navbar-bg-color: rgba(8, 29, 32, 0.86);
    --f7-navbar-title-text-color: #f6fbfa;
    --f7-navbar-link-color: #d8eeeb;
    --brand: #0f8f83;
    --brand-deep: #0a6158;
    --ink: #192330;
    --muted: #66778d;
    --line: rgba(15, 23, 42, 0.08);
    --panel: rgba(255,255,255,0.92);
    --page-a: #f4f8f4;
    --page-b: #edf4f1;
    --shadow-lg: 0 18px 42px rgba(15, 23, 42, 0.08);
    --shadow-sm: 0 10px 24px rgba(15, 23, 42, 0.06);
  }
  html, body, .page, .page-content {
    background:
      radial-gradient(circle at top left, rgba(15, 143, 131, 0.15), transparent 30%),
      radial-gradient(circle at top right, rgba(14, 165, 233, 0.12), transparent 24%),
      linear-gradient(180deg, var(--page-a), var(--page-b));
    color: var(--ink);
    overflow-x: hidden;
  }
  body {
    font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
  }
  .navbar { backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); }
  .navbar .title { font-weight: 800 !important; }
  .page-shell { width: min(100%, 760px); margin: 0 auto; padding: 12px 14px 110px; overflow-x: clip; }
  .hero-band {
    position: relative;
    overflow: hidden;
    margin-bottom: 14px;
    padding: 18px 18px 16px;
    border-radius: 22px;
    background: linear-gradient(145deg, rgba(8, 29, 32, 0.92), rgba(12, 76, 70, 0.9));
    color: #f8fffd;
    box-shadow: 0 22px 44px rgba(8, 29, 32, 0.2);
  }
  .hero-band::after {
    content: "";
    position: absolute;
    inset: auto -10% -40% 50%;
    width: 180px;
    height: 180px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(255,255,255,0.18), transparent 60%);
  }
  .hero-kicker { font-size: 14px; font-weight: 900; letter-spacing: 0.04em; text-transform: uppercase; color: rgba(235,247,244,0.9); }
  .hero-title { margin-top: 12px; font-size: 30px; line-height: 1.06; font-weight: 900; }
  .hero-sub { margin-top: 8px; font-size: 13px; line-height: 1.55; color: rgba(235,247,244,0.78); max-width: 28ch; }
  .module-bubble {
    position: relative;
    overflow: hidden;
    margin-bottom: 14px;
    padding: 18px 16px 16px;
    border: 1px solid rgba(15, 23, 42, 0.06);
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(247,250,249,0.88));
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  .module-bubble::after {
    content: "";
    position: absolute;
    inset: auto -14px -40px auto;
    width: 126px;
    height: 126px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(15,143,131,0.11), transparent 60%);
  }
  .module-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; position: relative; z-index: 1; }
  .module-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(15,143,131,0.08);
    border: 1px solid rgba(15,143,131,0.12);
    font-size: 12px;
    font-weight: 800;
    color: var(--brand-deep);
  }
  .module-pill::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--brand);
    box-shadow: 0 0 0 5px rgba(15,143,131,0.14);
  }
  .module-note { font-size: 12px; color: var(--muted); }
  .config-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    text-decoration: none;
    color: var(--ink);
    position: relative;
    z-index: 1;
  }
  .config-link::after {
    content: "›";
    font-size: 22px;
    color: #9aa7b8;
  }
  .config-label { font-size: 13px; font-weight: 750; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .config-value { margin-top: 6px; font-size: 15px; font-weight: 800; color: var(--ink); }
  .config-grid { display: grid; gap: 12px; position: relative; z-index: 1; }
  .config-field { display: grid; gap: 7px; }
  .config-field-label { font-size: 12px; font-weight: 750; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .config-select {
    width: 100%;
    min-height: 46px;
    padding: 0 14px;
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 16px;
    background: rgba(255,255,255,0.88);
    color: var(--ink);
    font-size: 15px;
    font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
    appearance: none;
    -webkit-appearance: none;
    background-image:
      linear-gradient(45deg, transparent 50%, #6b7a8d 50%),
      linear-gradient(135deg, #6b7a8d 50%, transparent 50%),
      linear-gradient(180deg, rgba(255,255,255,0.95), rgba(247,250,249,0.92));
    background-position:
      calc(100% - 22px) calc(50% - 1px),
      calc(100% - 16px) calc(50% - 1px),
      0 0;
    background-size: 6px 6px, 6px 6px, 100% 100%;
    background-repeat: no-repeat;
  }
  .config-select:focus {
    outline: none;
    border-color: rgba(15,143,131,0.45);
    box-shadow: 0 0 0 4px rgba(15,143,131,0.12);
  }
  .recorder-area { display: flex; flex-direction: column; align-items: center; padding: 0; position: relative; z-index: 1; }
  .timer-text { font-size: 46px; font-weight: 950; font-variant-numeric: tabular-nums; background: linear-gradient(135deg, var(--brand), var(--brand-deep)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 20px; }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); } 70% { box-shadow: 0 0 0 24px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
  .recording-pulse { animation: pulse-ring 1.8s infinite; }
  .record-btn {
    width: 184px;
    height: 184px;
    border-radius: 48px;
    font-size: 20px;
    font-weight: 850;
    box-shadow: 0 16px 34px rgba(15, 143, 131, 0.22);
    transition: transform .22s ease, box-shadow .22s ease;
  }
  .record-btn:active { transform: scale(0.99); }
  .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 700; margin: 14px auto 0; max-width: fit-content; }
  .status-badge.normal { background: #f1f5f9; color: #64748b; }
  .status-badge.error { background: #fef2f2; color: #b91c1c; }
  .status-badge.ok { background: #ecfdf3; color: #15803d; }
  .messages {
    position: relative;
    min-height: 260px;
    padding: 8px 0 16px;
    border: 1px solid rgba(15, 23, 42, 0.06);
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(248,252,250,0.92)) !important;
    box-shadow: var(--shadow-sm);
  }
  .messages::before {
    content: "对话记录";
    position: absolute;
    top: 14px;
    left: 18px;
    z-index: 2;
    font-size: 12px;
    font-weight: 750;
    color: var(--muted);
  }
  .messages .messages-content { padding-top: 28px; padding-bottom: 18px; }
  .messages .message { margin: 12px 14px; }
  .messages .message-name { margin-bottom: 6px; font-size: 11px; font-weight: 700; color: var(--muted); }
  .messages .bubble {
    padding: 13px 15px;
    border-radius: 18px;
    border: 1px solid rgba(15,23,42,0.06);
    background: rgba(255,255,255,0.95);
    color: var(--ink);
    box-shadow: 0 10px 18px rgba(15,23,42,0.05);
    font-size: 14px;
    line-height: 1.65;
  }
  .messages .message-avatar {
    width: 30px;
    height: 30px;
    border-radius: 999px;
    display: grid;
    place-items: center;
    background: #ecf7f3;
    box-shadow: inset 0 0 0 1px rgba(15,23,42,0.04);
  }
  .message-sent .bubble { background: linear-gradient(145deg, var(--brand), var(--brand-deep)) !important; color: #fff !important; border-color: transparent; }
  .message-sent .message-avatar { background: linear-gradient(145deg, #113b44, #0b5f69); color: #e8fbf8; }
</style>
</head>
<body>
<div id="app">
  <div class="view view-main">
    <div class="page">
      <div class="navbar">
        <div class="navbar-bg"></div>
        <div class="navbar-inner sliding">
          <div class="left"><span style="color:#fff;font-weight:700">雄达物流</span></div>
          <div class="title">客户陪练</div>
          <div class="right"><a href="/realtime" class="link" style="color:#fff">实时模式</a></div>
        </div>
      </div>

      <div class="page-content">
        <div class="page-shell">
          <section class="hero-band">
            <div class="hero-kicker">雄达物流</div>
            <div class="hero-title">客户陪练</div>
          </section>

          <section class="module-bubble">
            <div class="module-head">
              <span class="module-pill">训练配置</span>
              <span class="module-note">录音前确认阶段、难度和音色</span>
            </div>
            <div class="config-grid">
              <div class="config-field">
                <label class="config-field-label" for="stageSelect">阶段</label>
                <select class="config-select" id="stageSelect"></select>
              </div>
              <div class="config-field">
                <label class="config-field-label" for="difficultySelect">难度</label>
                <select class="config-select" id="difficultySelect"></select>
              </div>
              <div class="config-field">
                <label class="config-field-label" for="voiceSelect">音色</label>
                <select class="config-select" id="voiceSelect"></select>
              </div>
            </div>
          </section>

          <section class="module-bubble">
            <div class="module-head">
              <span class="module-pill">录音面板</span>
              <span class="module-note">按一次开始，再按一次结束</span>
            </div>
            <div class="recorder-area">
              <div class="timer-text" id="timer">00:00</div>
              <button class="button button-large button-fill record-btn" id="recordBtn" onclick="toggleRecording()">
                开始录音
              </button>
              <div class="status-badge normal" id="statusBadge">
                <span id="statusText">准备就绪</span>
              </div>
              <audio id="replyAudio" controls style="display:none;width:100%;margin-top:12px;height:40px;border-radius:12px" playsinline></audio>
            </div>
          </section>

          <section class="module-bubble">
            <div class="messages" id="chatMessages">
              <div class="messages-content"></div>
            </div>
          </section>
        </div>
      </div>
    </div>
  </div>

</div>

<script type="importmap">
{
  "imports": {
    "framework7": "https://cdn.jsdelivr.net/npm/framework7@8.3.1/+esm",
    "framework7/bundle": "https://cdn.jsdelivr.net/npm/framework7@8.3.1/bundle/+esm"
  }
}
</script>
<script type="module">
import Framework7 from 'framework7/bundle';
import { Dom7 } from 'framework7/bundle';

const app = new Framework7({ el: '#app', name: '雄达物流客户陪练', theme: 'md', darkMode: false });
const $$ = Dom7;

const $timer = $$('#timer');
const $recordBtn = $$('#recordBtn');
const $statusBadge = $$('#statusBadge');
const $statusText = $$('#statusText');
const $replyAudio = $$('#replyAudio');
const $stageSelect = $$('#stageSelect');
const $difficultySelect = $$('#difficultySelect');
const $voiceSelect = $$('#voiceSelect');

const messages = app.messages.create({ el: '#chatMessages' });

const state = { stage:'', difficulty:'', voice:'', stages:[], difficulties:[], voices:[], recording:false };
const sessionId = 'h5-' + Date.now() + '-' + Math.random().toString(16).slice(2);

let recorder = null; let startedAt = 0; let timerId = null; let unlockedCtx = null;

function setStatus(text, cls) {
  $statusText.text(text);
  $statusBadge.removeClass('normal error ok').addClass(cls || 'normal');
}

function updateTimer() {
  const s = Math.floor((Date.now() - startedAt) / 1000);
  $timer.text(String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0'));
}

async function unlockAudio() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) { unlockedCtx = unlockedCtx || new AC(); if (unlockedCtx.state === 'suspended') await unlockedCtx.resume(); const b = unlockedCtx.createBuffer(1,1,22050); const s = unlockedCtx.createBufferSource(); s.buffer=b; s.connect(unlockedCtx.destination); s.start(0); }
  } catch(e) {}
}

async function toggleRecording() {
  if (!state.recording) {
    await unlockAudio();
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder) { setStatus('浏览器不支持录音，请使用 HTTPS', 'error'); return; }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mime = ['audio/webm;codecs=opus','audio/webm','audio/mp4'].find(t=>MediaRecorder.isTypeSupported(t))||'';
      recorder = new MediaRecorder(stream, mime?{mimeType:mime}:undefined);
      const chunks = [];
      recorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
      recorder.onstop = async () => { stream.getTracks().forEach(t=>t.stop()); const blob = new Blob(chunks,{type:chunks[0]?.type||mime||'audio/webm'}); await upload(blob); };
      recorder.start();
      state.recording = true; startedAt = Date.now();
      timerId = setInterval(updateTimer, 250); updateTimer();
      $recordBtn.text('停止录音').css({background:'linear-gradient(135deg,#ef4444,#dc2626)',boxShadow:'0 8px 30px rgba(239,68,68,.4)'}).addClass('recording-pulse');
      setStatus('正在录音', 'ok');
    } catch(e) { setStatus(e.message||'录音失败','error'); }
  } else {
    if (!recorder || recorder.state === 'inactive') return;
    state.recording = false; clearInterval(timerId);
    $recordBtn.text('处理中').attr('disabled',true).removeClass('recording-pulse').css({background:'#94a3b8',boxShadow:'none'});
    setStatus('正在上传并生成客户回复', 'normal');
    recorder.stop();
  }
}

function fillSelect($el, items, value) {
  const html = items.map(item => '<option value="' + item.value + '">' + item.label + '</option>').join('');
  $el.html(html);
  if (value) $el.val(value);
}

async function upload(blob) {
  try {
    if (blob.size < 800) throw new Error('录音太短，请重新录一段');
    const form = new FormData();
    form.append('audio', blob, 'recording.' + (blob.type.includes('mp4')?'mp4':'webm'));
    form.append('stage_id', state.stage);
    form.append('difficulty_id', state.difficulty);
    form.append('voice_id', state.voice);
    form.append('session_id', sessionId);

    const res = await fetch('/api/training/voice-turn', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.detail || data.error || '请求失败');

    messages.addMessage({ text: data.prompt, type: 'sent', name: '我', avatar: '💼' });
    messages.addMessage({ text: data.response_text, type: 'received', name: '客户', avatar: '🧑' });

    if (data.audio_base64) {
      $replyAudio.attr('src', 'data:' + data.audio_mime + ';base64,' + data.audio_base64).show();
      try { $replyAudio[0].play(); } catch(e) {}
      setStatus('回复已生成', 'ok');
    } else { setStatus('已生成回复，无音频', 'error'); }
  } catch(e) { setStatus(e.message || '请求失败', 'error'); }
  $recordBtn.text('开始录音').attr('disabled',false).removeClass('recording-pulse').css({background:'linear-gradient(135deg,#0d9488,#0f766e)',boxShadow:'0 8px 30px rgba(13,148,136,.35)'});
  $timer.text('00:00');
}

async function loadConfig() {
  try { const r = await fetch('/api/training/config'); const d = await r.json();
    state.stages = d.stages; state.difficulties = d.difficulties; state.voices = d.voices;
    if (d.defaults) { state.stage = d.defaults.stage_id || ''; state.difficulty = d.defaults.difficulty_id || ''; state.voice = d.defaults.voice_id || ''; }
    fillSelect($stageSelect, state.stages, state.stage);
    fillSelect($difficultySelect, state.difficulties, state.difficulty);
    fillSelect($voiceSelect, state.voices, state.voice);
  } catch(e) {}
}

$stageSelect.on('change', function() { state.stage = $$(this).val(); });
$difficultySelect.on('change', function() { state.difficulty = $$(this).val(); });
$voiceSelect.on('change', function() { state.voice = $$(this).val(); });

window.toggleRecording = toggleRecording;
loadConfig();
messages.addMessage({ text: '你好，我这边可以听你说一句，尽量直接一点。', type: 'received', name: '客户', avatar: '🧑' });
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>训练配置 · 雄达物流</title>
<style>
  :root {
    --brand: #0f8f83;
    --brand-deep: #0a6158;
    --ink: #192330;
    --muted: #66778d;
    --line: rgba(15, 23, 42, 0.08);
    --panel: rgba(255, 255, 255, 0.92);
    --page-a: #f4f8f4;
    --page-b: #ecf3f0;
    --shadow-lg: 0 18px 42px rgba(15, 23, 42, 0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background:
      radial-gradient(circle at top left, rgba(15, 143, 131, 0.15), transparent 30%),
      radial-gradient(circle at top right, rgba(14, 165, 233, 0.12), transparent 26%),
      linear-gradient(180deg, var(--page-a), var(--page-b));
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    letter-spacing: 0;
  }
  .page-content {
    min-height: 100vh;
    padding: 16px 0 calc(100px + env(safe-area-inset-bottom));
    display: flex;
    justify-content: center;
  }
  .page-shell {
    width: min(calc(100vw - 28px), 760px);
  }
  .hero-band {
    position: relative;
    overflow: hidden;
    margin: 0 2px 14px;
    padding: 18px 18px 16px;
    border: 1px solid rgba(255,255,255,0.32);
    border-radius: 22px;
    background:
      linear-gradient(145deg, rgba(8, 29, 32, 0.92), rgba(12, 76, 70, 0.9)),
      linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0));
    box-shadow: 0 22px 44px rgba(8, 29, 32, 0.2);
    color: #f8fffd;
  }
  .hero-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 900;
    color: rgba(232, 246, 243, 0.9);
  }
  .hero-kicker::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #3dd3bf;
    box-shadow: 0 0 0 6px rgba(61, 211, 191, 0.14);
  }
  .hero-title {
    margin-top: 12px;
    font-size: 30px;
    line-height: 1.08;
    font-weight: 900;
  }
  .hero-sub {
    margin-top: 8px;
    max-width: 34ch;
    font-size: 13px;
    line-height: 1.55;
    color: rgba(235, 247, 244, 0.78);
  }
  .module-stack {
    display: grid;
    gap: 14px;
  }
  .module-bubble {
    position: relative;
    overflow: hidden;
    margin: 0 2px;
    padding: 16px;
    border: 1px solid rgba(15, 23, 42, 0.06);
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(247,250,249,0.88));
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  .module-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .module-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(15, 143, 131, 0.08);
    border: 1px solid rgba(15, 143, 131, 0.12);
    font-size: 12px;
    font-weight: 800;
    color: var(--brand-deep);
  }
  .module-pill::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--brand);
    box-shadow: 0 0 0 5px rgba(15, 143, 131, 0.14);
  }
  .surface-note {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .choice-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
    gap: 10px;
  }
  .choice {
    position: relative;
    display: block;
  }
  .choice input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .choice span {
    display: flex;
    min-height: 44px;
    align-items: center;
    justify-content: center;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.72);
    color: var(--ink);
    font-size: 13px;
    font-weight: 750;
    text-align: center;
  }
  .choice input:checked + span {
    border-color: rgba(15, 143, 131, 0.52);
    background: rgba(15, 143, 131, 0.1);
    color: var(--brand-deep);
    box-shadow: inset 0 0 0 1px rgba(15, 143, 131, 0.16);
  }
  .select-wrap {
    position: relative;
  }
  .select-wrap select {
    width: 100%;
    min-height: 48px;
    padding: 0 42px 0 14px;
    border: 1px solid var(--line);
    border-radius: 16px;
    outline: none;
    appearance: none;
    background: rgba(255, 255, 255, 0.78);
    color: var(--ink);
    font-size: 14px;
    font-weight: 750;
  }
  .select-wrap::after {
    content: "⌄";
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-58%);
    color: var(--muted);
    font-size: 20px;
    pointer-events: none;
  }
  .fab-btn {
    position: fixed;
    left: 50%;
    bottom: calc(24px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    width: min(calc(100vw - 40px), 420px);
    min-height: 56px;
    border: 0;
    border-radius: 999px;
    background: linear-gradient(135deg, #0f8f83, #0a6158);
    color: white;
    font-size: 17px;
    font-weight: 900;
    box-shadow: 0 18px 36px rgba(15, 143, 131, 0.28);
  }
  .fab-btn:disabled {
    opacity: 0.72;
  }
  .toast {
    margin: 10px 2px 0;
    min-height: 20px;
    color: #b42318;
    font-size: 13px;
    text-align: center;
  }
</style>
</head>
<body>
<main class="page-content">
  <div class="page-shell">
    <section class="hero-band">
      <div class="hero-kicker">雄达物流</div>
      <div class="hero-title">客户陪练配置</div>
      <div class="hero-sub">选择训练阶段、难度、客户音色和业务线，系统会锁定同一个案例进入对话。</div>
    </section>

    <div class="module-stack">
      <section class="module-bubble">
        <div class="module-head">
          <span class="module-pill">训练阶段</span>
          <span class="surface-note">选择场景</span>
        </div>
        <div class="choice-grid" id="stageChoices"></div>
      </section>

      <section class="module-bubble">
        <div class="module-head">
          <span class="module-pill">难度等级</span>
          <span class="surface-note">调整压力</span>
        </div>
        <div class="choice-grid" id="difficultyChoices"></div>
      </section>

      <section class="module-bubble">
        <div class="module-head">
          <span class="module-pill">客户音色</span>
          <span class="surface-note">语音角色</span>
        </div>
        <div class="select-wrap">
          <select id="voiceSelect"></select>
        </div>
      </section>

      <section class="module-bubble">
        <div class="module-head">
          <span class="module-pill">行业</span>
          <span class="surface-note">客户类型</span>
        </div>
        <div class="select-wrap">
          <select id="industrySelect"></select>
        </div>
      </section>

      <section class="module-bubble">
        <div class="module-head">
          <span class="module-pill">细分行业</span>
          <span class="surface-note">客户品类</span>
        </div>
        <div class="select-wrap">
          <select id="subIndustrySelect"></select>
        </div>
      </section>

      <section class="module-bubble">
        <div class="module-head">
          <span class="module-pill">业务线</span>
          <span class="surface-note">案例筛选</span>
        </div>
        <div class="select-wrap">
          <select id="businessSelect"></select>
        </div>
      </section>
    </div>
    <div class="toast" id="toast"></div>
  </div>
</main>

<button class="fab-btn" id="startBtn" type="button">开始训练</button>

<script>
const state = {
  stage_id: "",
  difficulty_id: "",
  voice_id: "",
  industry: "",
  sub_industry: "",
  business_line: "",
};

const SUB_INDUSTRY_EMOJI = {
  "": "✨",
  machinery_equipment: "⚙️",
  food_beverage: "🍽️",
  glass_equipment: "🪟",
  home_building_materials: "🏠",
  electronics: "🔌",
  auto_parts: "🚗",
  apparel_textile: "🧵",
  medical_devices: "🩺",
  chemical_materials: "🧪",
  outdoor_goods: "⛺",
  beauty_personal_care: "💄",
};

const $ = (id) => document.getElementById(id);

function escapeHtml(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, (ch) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[ch]));
}

function setToast(text) {
  $("toast").textContent = text || "";
}

function renderChoices(containerId, name, items, selectedValue, key) {
  const html = items.map((item) => {
    const checked = item.value === selectedValue ? "checked" : "";
    return `<label class="choice">
      <input type="radio" name="${name}" value="${escapeHtml(item.value)}" ${checked}>
      <span>${escapeHtml(item.label)}</span>
    </label>`;
  }).join("");
  $(containerId).innerHTML = html;
  $(containerId).querySelectorAll("input").forEach((input) => {
    input.addEventListener("change", () => {
      state[key] = input.value;
    });
  });
}

function renderSelect(selectId, items, selectedValue, key) {
  const select = $(selectId);
  select.innerHTML = items.map((item) => {
    const selected = item.value === selectedValue ? "selected" : "";
    return `<option value="${escapeHtml(item.value)}" ${selected}>${escapeHtml(item.label)}</option>`;
  }).join("");
  select.addEventListener("change", () => {
    state[key] = select.value;
  });
}

function withSubIndustryEmoji(item) {
  const label = String(item.label || "");
  const emoji = SUB_INDUSTRY_EMOJI[item.value] || "🏷️";
  return { ...item, label: label.startsWith(emoji) ? label : `${emoji} ${label}` };
}

function selectedRadioLabel(name) {
  const input = document.querySelector(`input[name="${name}"]:checked`);
  return input?.nextElementSibling?.textContent?.trim() || "";
}

function selectedSelectLabel(selectId) {
  const select = $(selectId);
  return select?.selectedOptions?.[0]?.textContent?.trim() || "";
}

async function loadConfig() {
  const res = await fetch("/api/training/config");
  if (!res.ok) throw new Error("训练配置加载失败");
  const data = await res.json();
  state.stage_id = data.defaults?.stage_id || data.stages?.[0]?.value || "";
  state.difficulty_id = data.defaults?.difficulty_id || data.difficulties?.[0]?.value || "";
  state.voice_id = data.defaults?.voice_id || data.voices?.[0]?.value || "";
  state.industry = data.industries?.[0]?.value || "";
  state.sub_industry = data.sub_industries?.[0]?.value || "";
  const businessLines = [{ label: "不限", value: "" }].concat(
    (data.business_lines || []).map((line) => ({ label: line, value: line }))
  );
  renderChoices("stageChoices", "stage_id", data.stages || [], state.stage_id, "stage_id");
  renderChoices("difficultyChoices", "difficulty_id", data.difficulties || [], state.difficulty_id, "difficulty_id");
  renderSelect("voiceSelect", data.voices || [], state.voice_id, "voice_id");
  renderSelect("industrySelect", data.industries || [], state.industry, "industry");
  renderSelect("subIndustrySelect", (data.sub_industries || []).map(withSubIndustryEmoji), state.sub_industry, "sub_industry");
  renderSelect("businessSelect", businessLines, state.business_line, "business_line");
}

async function startTraining() {
  const btn = $("startBtn");
  btn.disabled = true;
  btn.textContent = "正在匹配案例";
  setToast("");
  try {
    const params = new URLSearchParams({
      stage_id: state.stage_id,
      difficulty_id: state.difficulty_id,
      voice_id: state.voice_id,
    });
    if (state.industry) params.set("industry", state.industry);
    if (state.sub_industry) params.set("sub_industry", state.sub_industry);
    if (state.business_line) params.set("business_line", state.business_line);
    params.set("industry_label", selectedSelectLabel("industrySelect"));
    params.set("sub_industry_label", selectedSelectLabel("subIndustrySelect"));
    params.set("business_line_label", selectedSelectLabel("businessSelect"));
    const resolved = await fetch("/api/training/resolve-case?" + params.toString());
    if (!resolved.ok) throw new Error("案例匹配失败");
    const payload = await resolved.json();
    if (payload.case_id) params.set("case_id", payload.case_id);
    params.set("candidate_count", String(payload.candidate_count || 0));
    params.set("session_id", "ws-" + Date.now() + "-" + Math.random().toString(16).slice(2));
    location.href = "/wechat/chat?" + params.toString();
  } catch (err) {
    btn.disabled = false;
    btn.textContent = "开始训练";
    setToast(err.message || "启动失败");
  }
}

$("startBtn").addEventListener("click", startTraining);
loadConfig().catch((err) => setToast(err.message || "训练配置加载失败"));
</script>
</body>
</html>

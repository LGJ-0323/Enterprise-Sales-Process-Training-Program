<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>训练评分 · 雄达物流</title>
<style>
  :root {
    --brand: #0f8f83;
    --brand-deep: #0a6158;
    --ink: #192330;
    --muted: #66778d;
    --line: rgba(15, 23, 42, 0.08);
    --page-a: #f4f8f4;
    --page-b: #ecf3f0;
    --shadow-lg: 0 18px 42px rgba(15, 23, 42, 0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background:
      radial-gradient(circle at top left, rgba(15, 143, 131, 0.15), transparent 30%),
      radial-gradient(circle at top right, rgba(14, 165, 233, 0.12), transparent 26%),
      linear-gradient(180deg, var(--page-a), var(--page-b));
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    letter-spacing: 0;
  }
  .page-content {
    min-height: 100vh;
    padding: 12px 0 calc(104px + env(safe-area-inset-bottom));
    display: flex;
    justify-content: center;
  }
  .page-shell {
    width: min(calc(100vw - 28px), 760px);
  }
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 0 2px 12px;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    min-height: 36px;
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid rgba(15, 143, 131, 0.16);
    background: rgba(255,255,255,0.72);
    color: var(--brand-deep);
    text-decoration: none;
    font-size: 13px;
    font-weight: 800;
  }
  .page-title {
    flex: 1;
    min-width: 0;
    text-align: right;
    color: var(--brand-deep);
    font-size: 15px;
    font-weight: 900;
  }
  .module-stack {
    display: grid;
    gap: 14px;
  }
  .module-bubble {
    position: relative;
    overflow: hidden;
    margin: 0 2px;
    padding: 16px;
    border: 1px solid rgba(15, 23, 42, 0.06);
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(247,250,249,0.88));
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  .module-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .module-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(15, 143, 131, 0.08);
    border: 1px solid rgba(15, 143, 131, 0.12);
    font-size: 12px;
    font-weight: 800;
    color: var(--brand-deep);
  }
  .module-pill::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--brand);
    box-shadow: 0 0 0 5px rgba(15, 143, 131, 0.14);
  }
  .surface-note {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .score-panel {
    display: grid;
    grid-template-columns: auto 1fr;
    align-items: end;
    gap: 14px;
  }
  .score-big {
    font-size: 56px;
    font-weight: 950;
    line-height: 0.95;
    color: var(--brand-deep);
  }
  .score-label {
    margin-bottom: 5px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }
  .dim-list {
    display: grid;
    gap: 10px;
  }
  .dim-row {
    display: grid;
    grid-template-columns: minmax(78px, 108px) 1fr 42px;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }
  .dim-name {
    color: var(--ink);
    font-weight: 800;
    text-align: right;
  }
  .dim-bar-wrap {
    height: 8px;
    background: #e2e8f0;
    border-radius: 999px;
    overflow: hidden;
  }
  .dim-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #0f8f83, #3b82f6);
  }
  .dim-pct {
    color: var(--muted);
    font-weight: 850;
    text-align: right;
  }
  .feedback-list {
    display: grid;
    gap: 8px;
  }
  .fb-item {
    padding: 10px 12px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.55;
    border: 1px solid rgba(15, 23, 42, 0.06);
    background: rgba(255,255,255,0.78);
  }
  .fb-item.good {
    color: #027a48;
    background: #ecfdf3;
  }
  .fb-item.warn {
    color: #b54708;
    background: #fffaeb;
  }
  .turn-list {
    display: grid;
    gap: 12px;
  }
  .turn-item {
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(15, 23, 42, 0.07);
  }
  .turn-item:last-child {
    border-bottom: 0;
    padding-bottom: 0;
  }
  .turn-label {
    margin-bottom: 6px;
    color: var(--brand-deep);
    font-size: 12px;
    font-weight: 900;
  }
  .line {
    margin-top: 5px;
    color: var(--ink);
    font-size: 14px;
    line-height: 1.55;
    word-break: break-word;
  }
  .line span {
    color: var(--muted);
    font-weight: 850;
  }
  .empty {
    padding: 18px 0;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }
  .fab-btn {
    position: fixed;
    left: 50%;
    bottom: calc(24px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    width: min(calc(100vw - 40px), 420px);
    min-height: 56px;
    border: 0;
    border-radius: 999px;
    background: linear-gradient(135deg, #0f8f83, #0a6158);
    color: white;
    font-size: 17px;
    font-weight: 900;
    box-shadow: 0 18px 36px rgba(15, 143, 131, 0.28);
  }
</style>
</head>
<body>
<main class="page-content">
  <div class="page-shell">
    <div class="top-bar">
      <a class="back-link" href="/wechat/config">再练一次</a>
      <div class="page-title">训练评分</div>
    </div>

    <div class="module-stack">
      <section class="module-bubble">
        <div class="module-head">
          <span class="module-pill">本轮结果</span>
          <span class="surface-note" id="summaryMeta"></span>
        </div>
        <div class="score-panel">
          <div class="score-big" id="scoreBig">--</div>
          <div class="score-label" id="scoreLabel">正在加载评分...</div>
        </div>
      </section>

      <section class="module-bubble" id="dimCard">
        <div class="module-head">
          <span class="module-pill">评分明细</span>
          <span class="surface-note">维度表现</span>
        </div>
        <div class="dim-list" id="dimBars"></div>
      </section>

      <section class="module-bubble" id="feedbackCard">
        <div class="module-head">
          <span class="module-pill">教练反馈</span>
          <span class="surface-note">复盘建议</span>
        </div>
        <div class="feedback-list" id="feedbackList"></div>
      </section>

      <section class="module-bubble">
        <div class="module-head">
          <span class="module-pill">对话记录</span>
          <span class="surface-note" id="turnMeta"></span>
        </div>
        <div class="turn-list" id="turnList"></div>
      </section>
    </div>
  </div>
</main>

<button class="fab-btn" type="button" id="againBtn">重新配置训练</button>

<script>
const params = new URLSearchParams(location.search);
const sessionId = params.get("session_id") || "";
const $ = (id) => document.getElementById(id);

function escapeHtml(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, (ch) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[ch]));
}

function renderDimensions(dimensions) {
  if (!dimensions || dimensions.length === 0) {
    $("dimCard").style.display = "none";
    return;
  }
  $("dimCard").style.display = "";
  $("dimBars").innerHTML = dimensions.map((item) => {
    const max = Number(item.max_score || item.max || 0);
    const score = Number(item.score || 0);
    const pct = max ? Math.max(0, Math.min(100, Math.round(score * 100 / max))) : Math.max(0, Math.min(100, score));
    return `<div class="dim-row">
      <div class="dim-name">${escapeHtml(item.dimension || item.name || "")}</div>
      <div class="dim-bar-wrap"><div class="dim-bar-fill" style="width:${pct}%"></div></div>
      <div class="dim-pct">${pct}%</div>
    </div>`;
  }).join("");
}

function renderFeedback(evaluation) {
  const rows = [];
  (evaluation.strengths || []).forEach((text) => rows.push({ kind: "good", text }));
  (evaluation.improvements || []).forEach((text) => rows.push({ kind: "warn", text }));
  if (rows.length === 0) {
    $("feedbackCard").style.display = "none";
    return;
  }
  $("feedbackCard").style.display = "";
  $("feedbackList").innerHTML = rows.map((row) => `<div class="fb-item ${row.kind}">${escapeHtml(row.text)}</div>`).join("");
}

function renderTurns(turns) {
  $("turnMeta").textContent = turns.length ? `${turns.length} 轮` : "";
  if (!turns.length) {
    $("turnList").innerHTML = '<div class="empty">暂无对话记录</div>';
    return;
  }
  $("turnList").innerHTML = turns.map((turn) => `<div class="turn-item">
    <div class="turn-label">第 ${escapeHtml(turn.turn_index || "?")} 轮</div>
    ${turn.user_text ? `<div class="line"><span>我：</span>${escapeHtml(turn.user_text)}</div>` : ""}
    ${turn.assistant_text ? `<div class="line"><span>客户：</span>${escapeHtml(turn.assistant_text)}</div>` : ""}
  </div>`).join("");
}

function renderSummary(data) {
  const session = data.session || {};
  const caseInfo = data.case || {};
  const evaluation = data.evaluation || {};
  const score = evaluation.total_score;
  $("scoreBig").textContent = score == null ? "--" : score;
  $("scoreLabel").textContent = [
    caseInfo.customer_name || "客户",
    caseInfo.training_type || "",
    caseInfo.difficulty || "",
  ].filter(Boolean).join(" · ") || "训练结果";
  $("summaryMeta").textContent = [
    session.turn_count ? `${session.turn_count} 轮` : "",
    session.final_state || "",
    session.completed_at ? String(session.completed_at).slice(0, 10) : "",
  ].filter(Boolean).join(" · ");
  renderDimensions(evaluation.dimension_scores || []);
  renderFeedback(evaluation);
  renderTurns(data.turns || []);
  return score != null;
}

async function loadScore(attempt = 0) {
  if (!sessionId) {
    $("scoreBig").textContent = "?";
    $("scoreLabel").textContent = "缺少 session_id";
    $("dimCard").style.display = "none";
    $("feedbackCard").style.display = "none";
    $("turnList").innerHTML = '<div class="empty">无法加载本轮会话</div>';
    return;
  }
  try {
    const res = await fetch("/api/training/session-summary?session_id=" + encodeURIComponent(sessionId));
    if (!res.ok) throw new Error("评分加载失败");
    const data = await res.json();
    const hasScore = renderSummary(data);
    if (!hasScore && attempt < 8) {
      $("scoreLabel").textContent = "评分生成中...";
      setTimeout(() => loadScore(attempt + 1), 900);
    }
  } catch (err) {
    $("scoreBig").textContent = "!";
    $("scoreLabel").textContent = err.message || "评分加载失败";
    $("dimCard").style.display = "none";
    $("feedbackCard").style.display = "none";
  }
}

$("againBtn").addEventListener("click", () => {
  location.href = "/wechat/config";
});
loadScore();
</script>
</body>
</html>
